server.port=${PORT:9797}

####### Data-Source Properties#######
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

###### JPA Properties######
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

springdoc.packagesToScan=com.satishgupta.quizadda_server.controllers
springdoc.pathsToMatch= /user/**, /category/**, /question/**, /quiz/**, /**

####### CORS #######
# Comma-separated list of allowed origins (Angular dev server + deployed frontend).
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}
