spring.application.name=quizadda-server
server.port=${PORT:9797}

####### Data-Source #######
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

####### JPA / Hibernate #######
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

####### Jackson #######
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

####### Swagger / OpenAPI #######
springdoc.packagesToScan=com.satishgupta.quizadda_server.controllers
springdoc.pathsToMatch=/api/**

####### JWT #######
# HS256 secret. MUST be at least 32 bytes when UTF-8 encoded.
app.jwt.secret=${JWT_SECRET}
# Token lifetime in milliseconds. Default: 5 hours.
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:18000000}

####### CORS #######
# Comma-separated list of allowed origins. Defaults to the Angular dev server.
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}

####### File storage / uploads #######
app.storage.location=./uploads
app.storage.public-url=/uploads
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB

####### Logging #######
logging.level.com.satishgupta.quizadda_server=INFO
logging.level.org.springframework.security=WARN
