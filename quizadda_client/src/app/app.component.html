<ngx-ui-loader
  fgsColor="#6366F1"
  pbColor="#6366F1"
  text="Loading..."
  fgsType="three-strings"
></ngx-ui-loader>

<!-- Full-screen splash; renders nothing once boot is ready. -->
<app-boot-gate></app-boot-gate>

<!-- Floating banner for any in-flight request that stalls past 3 s. -->
<app-slow-server-banner></app-slow-server-banner>

<!-- Keyboard-accessible skip-to-content link; visible only when focused. -->
<a class="skip-link" href="#main-content">Skip to main content</a>

<div class="app-shell">
  <app-navbar></app-navbar>

  <main id="main-content" class="app-main" tabindex="-1">
    <router-outlet></router-outlet>
  </main>

  <app-footer></app-footer>
</div>
