<section class="auth-page hero-bg">
  <div class="app-container forgot-grid">
    <div class="auth-card surface-card">
      <h2>Set a new password</h2>
      <p class="text-muted mb20">Pick a password you'll remember this time.</p>

      <div *ngIf="errorMessage" class="error-banner">
        <mat-icon>error</mat-icon>
        {{ errorMessage }}
      </div>

      <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
        <mat-form-field class="w100" appearance="outline">
          <mat-label>New password</mat-label>
          <input formControlName="newPassword" type="password" matInput autocomplete="new-password">
          <mat-icon matPrefix>lock_reset</mat-icon>
          <mat-error *ngIf="form.controls.newPassword.touched && form.controls.newPassword.errors?.['required']">Required</mat-error>
          <mat-error *ngIf="form.controls.newPassword.touched && form.controls.newPassword.errors?.['minlength']">Min 4 characters</mat-error>
        </mat-form-field>
        <mat-form-field class="w100" appearance="outline">
          <mat-label>Confirm password</mat-label>
          <input formControlName="confirmPassword" type="password" matInput autocomplete="new-password">
          <mat-icon matPrefix>lock_reset</mat-icon>
          <mat-error *ngIf="form.controls.confirmPassword.touched && form.controls.confirmPassword.errors?.['required']">Required</mat-error>
          <mat-error *ngIf="form.errors?.['mismatch'] && form.controls.confirmPassword.touched">Passwords do not match</mat-error>
        </mat-form-field>

        <div class="form-actions">
          <button type="submit" mat-raised-button color="primary" [disabled]="submitting">
            <mat-icon *ngIf="!submitting">lock_open</mat-icon>
            {{ submitting ? 'Updating...' : 'Update password' }}
          </button>
        </div>
      </form>

      <div class="auth-foot">
        <a routerLink="/login">Back to login</a>
      </div>
    </div>
  </div>
</section>
