<div class="bootstrap-wrapper">
    <div class="container">
        <div class="row mt20">
            <div class="col-md-6 offset-md-3">
                <mat-card>
                    <mat-card-content>
                        <div class="container text-center">
                            <img src="../../../assets/register.png" alt="register" style="width: 100px; height: 100px;">
                        </div>
                        <h1 class="text-center">Login Here !!</h1>
                        <form [formGroup]="form" (ngSubmit)="submit()">
                            <mat-form-field class="full-width" appearance="outline">
                                <mat-label>Username</mat-label>
                                <input formControlName="username" matInput placeholder="Username" autocomplete="username">
                                <mat-error *ngIf="form.controls.username.touched && form.controls.username.errors?.['required']">
                                    Username is required
                                </mat-error>
                            </mat-form-field>

                            <mat-form-field class="full-width" appearance="outline">
                                <mat-label>Password</mat-label>
                                <input formControlName="password" type="password" matInput placeholder="Password" autocomplete="current-password">
                                <mat-error *ngIf="form.controls.password.touched && form.controls.password.errors?.['required']">
                                    Password is required
                                </mat-error>
                            </mat-form-field>

                            <div class="container text-center">
                                <button type="submit" mat-raised-button color="primary" [disabled]="submitting">
                                    {{ submitting ? 'Signing in...' : 'Login' }}
                                </button>
                                <button type="button" class="ml20" mat-raised-button color="accent" (click)="resetForm()">Clear</button>
                            </div>
                        </form>
                        <div class="mt20 text-center">
                            <a mat-button routerLink="/signup">New to Quiz Adda? Create an account</a>
                        </div>
                    </mat-card-content>
                </mat-card>
            </div>
        </div>
    </div>
</div>
