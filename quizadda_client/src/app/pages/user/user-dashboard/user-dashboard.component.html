<mat-sidenav-container class="dashboard-shell" autosize>
  <mat-sidenav
    #sidenav
    class="dashboard-drawer"
    [mode]="isHandset ? 'over' : 'side'"
    [opened]="!isHandset"
    [fixedInViewport]="false">
    <app-user-sidebar></app-user-sidebar>
  </mat-sidenav>

  <mat-sidenav-content>
    <div class="dashboard-topbar" *ngIf="isHandset">
      <button mat-icon-button type="button" aria-label="Open menu" (click)="sidenav.toggle()">
        <mat-icon>menu</mat-icon>
      </button>
      <span>Categories</span>
    </div>

    <div class="dashboard-content app-container">
      <router-outlet></router-outlet>
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
