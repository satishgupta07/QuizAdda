<div class="sidebar">
  <div class="sidebar-header">
    <span class="icon-chip"><mat-icon>school</mat-icon></span>
    <div>
      <div class="sidebar-title">Categories</div>
      <div class="sidebar-sub">Pick a quiz to attempt</div>
    </div>
  </div>

  <nav class="sidebar-nav">
    <a routerLink="/user-dashboard" [routerLinkActiveOptions]="{ exact: true }" routerLinkActive="active">
      <mat-icon>ballot</mat-icon><span>All Quizzes</span>
    </a>
    <a *ngFor="let c of categories; trackBy: trackByCatId"
       [routerLink]="['/user-dashboard', c.catId]"
       routerLinkActive="active">
      <mat-icon>category</mat-icon>
      <span>{{ c.title }}</span>
    </a>
  </nav>
</div>
