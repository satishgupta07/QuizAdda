<div class="sidebar">
  <div class="sidebar-header">
    <span class="icon-chip"><mat-icon>admin_panel_settings</mat-icon></span>
    <div>
      <div class="sidebar-title">Admin</div>
      <div class="sidebar-sub">Manage content</div>
    </div>
  </div>

  <nav class="sidebar-nav">
    <a routerLink="/admin" [routerLinkActiveOptions]="{ exact: true }" routerLinkActive="active">
      <mat-icon>home</mat-icon><span>Home</span>
    </a>
    <a routerLink="/admin/profile" routerLinkActive="active">
      <mat-icon>account_circle</mat-icon><span>Profile</span>
    </a>
    <a routerLink="/admin/analytics" routerLinkActive="active">
      <mat-icon>insights</mat-icon><span>Analytics</span>
    </a>

    <div class="sidebar-section">Categories</div>
    <a routerLink="/admin/categories" routerLinkActive="active">
      <mat-icon>list</mat-icon><span>All Categories</span>
    </a>
    <a routerLink="/admin/add-category" routerLinkActive="active">
      <mat-icon>library_add</mat-icon><span>Add Category</span>
    </a>

    <div class="sidebar-section">Quizzes</div>
    <a routerLink="/admin/quizzes" routerLinkActive="active">
      <mat-icon>quiz</mat-icon><span>All Quizzes</span>
    </a>
    <a routerLink="/admin/add-quiz" routerLinkActive="active">
      <mat-icon>add_circle_outline</mat-icon><span>Add Quiz</span>
    </a>
  </nav>
</div>
